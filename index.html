<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solvista — a city that builds itself</title>
<meta name="description" content="A procedural cellular-automata city on a hex grid, grown one verified step at a time by an autonomous Claude Code loop.">
<meta name="theme-color" content="#0d0d0d">
<style>
  html,body{margin:0;height:100%;background:#0d0d0d;overflow:hidden}
  iframe{border:0;position:fixed;inset:0;width:100%;height:100%;display:block}
  .badge{position:fixed;right:14px;bottom:14px;z-index:2;
    font:600 14px/1 system-ui,-apple-system,"Segoe UI",sans-serif}
  .badge a{display:inline-block;color:#fff;text-decoration:none;padding:10px 14px;border-radius:999px;
    background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .badge a:hover{background:rgba(0,0,0,.72)}
  @media print{.badge{display:none}}
</style>
</head>
<body>
  <!-- The living diorama. solvista.html is regenerated by the loop every iteration;
       this wrapper keeps the stats link (and a stable /solvista/ landing URL) out of it. -->
  <iframe src="solvista.html" title="Solvista — the living city" allow="fullscreen"></iframe>
  <div class="badge"><a href="stats.html">📊&nbsp; cost &amp; time &rarr;</a></div>
</body>
</html>
